apiVersion: 1

datasources:
  - name: InfluxDB-v3-SQL
    type: influxdb
    access: proxy
    url: http://$INFLUXDB_HOST:8181
    jsonData:
      version: SQL
      httpMode: POST
    secureJsonData:
      token: $INFLUXDB_TOKEN
    database: $INFLUXDB_BUCKET
    isDefault: true
    editable: true
